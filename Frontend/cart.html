<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Quick Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f8f9fa;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent-color: #5f4897;
            --accent-hover: #7c3aed;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --border-color: #e5e7eb;
            --gradient-start: #6b46c1;
            --gradient-end: #9333ea;
            --card-bg: #ffffff;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        [data-theme="dark"] {
            --primary-bg: #1a0f2e;
            --secondary-bg: #0f0820;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-color: #a78bfa;
            --accent-hover: #c4b5fd;
            --shadow-color: rgba(107, 70, 193, 0.3);
            --border-color: #2d1b4e;
            --card-bg: rgba(26, 15, 46, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%),
                        var(--secondary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 76px;
        }

        .cart-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .cart-header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.6s ease;
        }

        .cart-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .cart-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease;
        }

        .cart-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .item-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .item-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            padding: 1rem;
            background: var(--secondary-bg);
            border-radius: 12px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .detail-item i {
            color: var(--accent-color);
            width: 20px;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .status-pending { background: #fef3c7; color: #92400e; }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-remove {
            background: var(--error-color);
            color: white;
        }

        .btn-remove:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .cart-summary {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 15px var(--shadow-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 0 1rem 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .checkout-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(107, 70, 193, 0.5);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-icon {
            font-size: 5rem;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        .loading {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 1rem;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            .cart-content {
                grid-template-columns: 1fr;
            }
            .cart-summary {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <div id="sidebar-container"></div>

    <main class="cart-container">
        <div class="cart-header">
            <h1><i class="fas fa-shopping-cart"></i> My Cart</h1>
            <p>Review your items and proceed to checkout</p>
        </div>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <h3>Loading your cart...</h3>
        </div>

        <div id="emptyState" class="empty-cart" style="display: none;">
            <div class="empty-icon">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <h2>Your cart is empty</h2>
            <p>Add services to get started!</p>
            <br>
            <a href="services.html" class="btn" style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; text-decoration: none; display: inline-flex;">
                <i class="fas fa-plus"></i> Browse Services
            </a>
        </div>

        <div id="cartContent" class="cart-content" style="display: none;">
            <div class="cart-items" id="cartItems"></div>
            
            <div class="cart-summary">
                <h3 class="summary-title">Cart Summary</h3>
                <div class="summary-item">
                    <span>Total Items:</span>
                    <strong id="totalItems">0</strong>
                </div>
                <div class="summary-item">
                    <span>Subtotal:</span>
                    <strong id="subtotal">₹0</strong>
                </div>
                <div class="summary-total">
                    <span>Total:</span>
                    <span id="grandTotal">₹0</span>
                </div>
                
                <!-- ✅ CHECKOUT BUTTON ADDED -->
                <button id="checkoutBtn" class="checkout-btn" onclick="proceedToCheckout()">
                    <i class="fas fa-check-circle"></i>
                    <span>Proceed to Checkout</span>
                </button>
            </div>
        </div>
    </main>

    <script src="js/cart.js"></script>
    <script>
        // Load Header & Sidebar
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                const headerScript = document.createElement('script');
                headerScript.src = 'js/header.js';
                document.body.appendChild(headerScript);
            });

        fetch('sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                const sidebarScript = document.createElement('script');
                sidebarScript.src = 'js/sidebar.js';
                document.body.appendChild(sidebarScript);
            });
    </script>
</body>
</html>
