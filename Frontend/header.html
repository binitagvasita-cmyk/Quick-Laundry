<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Laundry - Satellite, Ahmedabad</title>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Header CSS -->
    <link rel="stylesheet" href="css/header.css" />
  </head>
  <body>
    <!-- Floating Shirt Animation -->
    <div class="floating-shirt">
      <i class="fas fa-tshirt"></i>
    </div>

    <!-- Header Component -->
    <header class="header" id="header">
      <div class="header-container">
        <!-- Logo Section -->
        <div class="logo-section">
          <img
            src="../Frontend/images/services/logo2.jpeg"
            alt="Cleanify Laundry Logo"
            class="logo-img"
          />
          <span class="logo-text">Quick Laundry</span>
        </div>

        <!-- Navigation Links -->
        <nav class="nav-links" id="navLinks">
          <a href="home-content.html" class="nav-link active">
            <i class="fas fa-home"></i>
            <span>Home</span>
          </a>

          <!-- Services Dropdown -->
          <div class="nav-dropdown">
            <a href="services.html" class="nav-link">
              <i class="fas fa-concierge-bell"></i>
              <span>Services</span>
              <i class="fas fa-chevron-down dropdown-arrow"></i>
            </a>

            <!-- Dropdown Menu -->
            <div class="services-dropdown">
              <div class="dropdown-header">
                <i class="fas fa-sparkles"></i>
                <span>Our Services</span>
              </div>
              <div class="dropdown-list">
                <a href="iron.html" class="dropdown-item">
                  <i class="fas fa-iron"></i>
                  <span>Iron Only</span>
                </a>
                <a href="wash-iron.html" class="dropdown-item">
                  <i class="fas fa-soap"></i>
                  <span>Wash & Iron</span>
                </a>
                <a href="roll-press.html" class="dropdown-item">
                  <i class="fas fa-scroll"></i>
                  <span>Roll Press</span>
                </a>
                <a href="steam-press.html" class="dropdown-item">
                  <i class="fas fa-wind"></i>
                  <span>Steam Press</span>
                </a>
                <a href="dry-clean.html" class="dropdown-item">
                  <i class="fas fa-vest"></i>
                  <span>Dry Clean</span>
                </a>
              </div>
            </div>
          </div>

          <a href="review.html" class="nav-link">
            <i class="fas fa-star"></i>
            <span>Review</span>
          </a>
          <a href="about.html" class="nav-link">
            <i class="fas fa-envelope"></i>
            <span>About Us</span>
          </a>
        </nav>

        <!-- Right Section: Theme Toggle + Auth -->
        <div class="header-right">
          <!-- Theme Toggle -->
          <div class="theme-toggle" id="themeToggle">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
          </div>

          <!-- Login Button -->
          <button class="login-btn" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i>
            <span>Login</span>
          </button>

          <!-- User Menu (Hidden by default) -->
          <div class="user-menu" id="userMenu" style="display: none">
            <div class="user-profile">
              <div class="user-avatar">
                <i class="fas fa-user"></i>
              </div>
              <span class="user-name">John Doe</span>
              <i class="fas fa-chevron-down user-dropdown-arrow"></i>

              <div class="user-dropdown-menu">
                <a href="profile.html" class="user-dropdown-item">
                  <i class="fas fa-user-circle"></i>
                  <span>Profile</span>
                </a>
                <a href="cart.html" class="user-dropdown-item">
                  <i class="fas fa-shopping-bag"></i>
                  <span>My Cart</span>
                </a>
                <a href="logout.html" class="user-dropdown-item" id="logoutBtn">
                  <i class="fas fa-sign-out-alt"></i>
                  <span>Logout</span>
                </a>
              </div>
            </div>
          </div>

          <!-- Sidebar Toggle Button -->
          <button class="sidebar-toggle-btn" id="sidebarToggle">
            <i class="fas fa-bars"></i>
          </button>

          <!-- Mobile Menu Toggle -->
          <div class="mobile-toggle" id="mobileToggle">
            <i class="fas fa-bars"></i>
          </div>
        </div>
      </div>
    </header>

    <!-- Header JavaScript -->
    <script src="js/header.js"></script>
  </body>
</html>
