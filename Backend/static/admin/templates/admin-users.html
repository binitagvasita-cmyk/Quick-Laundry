<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Quick Laundry Admin</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        /* Force All Users to be active on this page */
        #sidebar-container a[href="/admin/users"],
        .sidebar a[href="/admin/users"] {
            background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3) !important;
        }

        /* Sidebar Container */
        #sidebar-container {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 280px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 32px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 32px 40px;
            border-radius: 16px;
            margin-bottom: 32px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header-left h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header-left p {
            font-size: 14px;
            color: #94a3b8;
        }

        .page-header-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1e293b;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
        }

        .stat-card-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .stat-icon.primary { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; }
        .stat-icon.success { background: rgba(34, 197, 94, 0.15); color: #86efac; }
        .stat-icon.warning { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
        .stat-icon.danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }

        /* Filters Section */
        .filters-section {
            background: #1e293b;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 24px;
        }

        .filters-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
        }

        .filter-input,
        .filter-select {
            background: #0f172a;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .filter-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .filter-input::placeholder {
            color: #475569;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.15);
            color: #cbd5e1;
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .btn-success:hover {
            background: rgba(34, 197, 94, 0.25);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* Users Table */
        .users-table-container {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            overflow: hidden;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table thead {
            background: rgba(99, 102, 241, 0.05);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .users-table th {
            padding: 16px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .users-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            font-size: 14px;
            color: #cbd5e1;
        }

        .users-table tbody tr {
            transition: background 0.2s ease;
        }

        .users-table tbody tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-name {
            font-weight: 600;
            color: #f1f5f9;
        }

        .user-email {
            font-size: 12px;
            color: #64748b;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.active {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
        }

        .badge.inactive {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }

        .badge.admin {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
        }

        .badge.verified {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }

        .badge.unverified {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .action-btn.view {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }

        .action-btn.view:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        .action-btn.edit {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
        }

        .action-btn.edit:hover {
            background: rgba(245, 158, 11, 0.25);
        }

        .action-btn.delete {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: #1e293b;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .pagination-info {
            font-size: 13px;
            color: #94a3b8;
        }

        .pagination-buttons {
            display: flex;
            gap: 8px;
        }

        .pagination-btn {
            padding: 8px 16px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
            color: #c7d2fe;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-color: transparent;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #64748b;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: #475569;
        }

        .empty-state h3 {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }

        .modal-body {
            padding: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
        }

        .detail-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }

        .detail-value {
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            #sidebar-container {
                width: 80px;
            }

            .main-content {
                margin-left: 80px;
            }

            .filters-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .page-header {
                padding: 24px;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }

            .users-table {
                font-size: 13px;
            }

            .users-table th,
            .users-table td {
                padding: 12px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading users...</div>
    </div>

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <header class="page-header">
            <div class="page-header-left">
                <h1>
                    <i class="fas fa-users"></i>
                    User Management
                </h1>
                <p>Manage and monitor all registered users</p>
            </div>
            <div class="page-header-right">
                <button class="btn btn-secondary" onclick="exportUsers()">
                    <i class="fas fa-download"></i>
                    Export CSV
                </button>
                <button class="btn btn-primary" onclick="window.location.href='/admin/admins'">
                    <i class="fas fa-user-shield"></i>
                    Admin Management
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-card-content">
                    <div>
                        <div class="stat-value" id="totalUsersCount">0</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-icon primary">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-card-content">
                    <div>
                        <div class="stat-value" id="activeUsersCount">0</div>
                        <div class="stat-label">Active Users</div>
                    </div>
                    <div class="stat-icon success">
                        <i class="fas fa-user-check"></i>
                    </div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-card-content">
                    <div>
                        <div class="stat-value" id="verifiedUsersCount">0</div>
                        <div class="stat-label">Verified Users</div>
                    </div>
                    <div class="stat-icon warning">
                        <i class="fas fa-certificate"></i>
                    </div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-card-content">
                    <div>
                        <div class="stat-value" id="newUsersCount">0</div>
                        <div class="stat-label">New This Month</div>
                    </div>
                    <div class="stat-icon danger">
                        <i class="fas fa-user-plus"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters Section -->
        <div class="filters-section">
            <div class="filters-row">
                <div class="filter-group">
                    <label class="filter-label">Search Users</label>
                    <input 
                        type="text" 
                        class="filter-input" 
                        id="searchInput" 
                        placeholder="Search by name, email, or phone..."
                    >
                </div>
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Verification</label>
                    <select class="filter-select" id="verificationFilter">
                        <option value="">All</option>
                        <option value="verified">Verified</option>
                        <option value="unverified">Unverified</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Type</label>
                    <select class="filter-select" id="typeFilter">
                        <option value="customer">Customers</option>
                        <option value="admin">Admins</option>
                        <option value="all">All Users</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">&nbsp;</label>
                    <button class="btn btn-secondary" onclick="resetFilters()">
                        <i class="fas fa-redo"></i>
                        Reset
                    </button>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="users-table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Phone</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Verified</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-users"></i>
                                <h3>Loading users...</h3>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="pagination">
                <div class="pagination-info" id="paginationInfo">
                    Showing 0 of 0 users
                </div>
                <div class="pagination-buttons" id="paginationButtons">
                    <!-- Pagination buttons will be generated here -->
                </div>
            </div>
        </div>
    </main>

    <!-- User Details Modal -->
    <div class="modal-overlay" id="userDetailsModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">User Details</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- User details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = window.location.origin;
        const API_ENDPOINTS = {
            verify: `${API_BASE_URL}/api/admin/auth/verify`,
            users: `${API_BASE_URL}/api/admin/users/list`,
            userDetails: `${API_BASE_URL}/api/admin/users`,
            toggleStatus: `${API_BASE_URL}/api/admin/users`,
            deleteUser: `${API_BASE_URL}/api/admin/users`,
            login: `${API_BASE_URL}/admin`
        };

        // Global state
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = {
            search: '',
            status: '',
            verification: '',
            type: 'customer'
        };

        // =====================================================
        // SIDEBAR COMPONENT LOADER
        // =====================================================
        async function loadSidebar() {
            const paths = [
                '/static/admin/templates/admin-sidebar.html',
                '/static/admin/admin-sidebar.html',
                '/admin-sidebar.html'
            ];
            for (const path of paths) {
                try {
                    const res = await fetch(path);
                    if (!res.ok) continue;
                    const html = await res.text();
                    const container = document.getElementById('sidebar-container');
                    container.innerHTML = html;
                    container.querySelectorAll('script').forEach(function(oldScript) {
                        const newScript = document.createElement('script');
                        newScript.textContent = oldScript.textContent;
                        document.head.appendChild(newScript);
                        document.head.removeChild(newScript);
                    });
                    console.log('✅ Sidebar loaded and scripts executed:', path);
                    return;
                } catch (e) { continue; }
            }
            console.error('❌ Sidebar could not be loaded from any path');
        }
        // =====================================================

        // Set active menu item based on current page
        function setActiveMenuItem() {
            const currentPath = window.location.pathname;
            console.log('Current path:', currentPath);
            
            // Find all sidebar links
            const sidebarLinks = document.querySelectorAll('#sidebar-container a[href], .sidebar a[href]');
            
            sidebarLinks.forEach(link => {
                const href = link.getAttribute('href');
                
                // Skip logout button
                if (link.classList.contains('logout-btn') || link.id === 'logoutBtn') {
                    return;
                }
                
                // Reset to default state
                link.classList.remove('active');
                link.style.background = '';
                link.style.color = '#94a3b8';
                link.style.boxShadow = '';
                
                // Set active if path matches
                if (href === currentPath) {
                    link.classList.add('active');
                    link.style.background = 'linear-gradient(135deg, #6366f1, #8b5cf6)';
                    link.style.color = '#fff';
                    link.style.boxShadow = '0 4px 12px rgba(99, 102, 241, 0.3)';
                    console.log('✅ Set active:', href);
                }
            });
        }


        async function handleLogout() {
            if (!confirm('Are you sure you want to logout?')) {
                return;
            }

            const token = localStorage.getItem('adminToken') || localStorage.getItem('admin_token');
            
            try {
                await fetch(`${API_BASE_URL}/api/admin/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
            } catch (error) {
                console.error('Logout error:', error);
            } finally {
                redirectToLogin();
            }
        }

        // Check authentication
        async function checkAuth() {
            const token = localStorage.getItem('adminToken') || localStorage.getItem('admin_token');
            
            if (!token) {
                redirectToLogin();
                return false;
            }

            try {
                const response = await fetch(API_ENDPOINTS.verify, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.success) {
                    return true;
                } else {
                    redirectToLogin();
                    return false;
                }
            } catch (error) {
                console.error('Auth check error:', error);
                redirectToLogin();
                return false;
            }
        }

        // Load users data
        async function loadUsers() {
            const token = localStorage.getItem('adminToken') || localStorage.getItem('admin_token');

            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    limit: 10,
                    search: currentFilters.search,
                    status: currentFilters.status,
                    type: currentFilters.type
                });

                console.log('📡 Fetching users:', `${API_ENDPOINTS.users}?${params}`);

                const response = await fetch(`${API_ENDPOINTS.users}?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                console.log('📥 Response status:', response.status);

                const result = await response.json();
                console.log('📦 Response data:', result);

                if (result.success) {
                    displayUsers(result.data.users);
                    updatePagination(result.data.pagination);
                    updateStats(result.data.users);
                } else {
                    console.error('❌ API Error:', result.message);
                    showError(result.message || 'Failed to load users');
                    
                    // Show error in table
                    document.getElementById('usersTableBody').innerHTML = `
                        <tr>
                            <td colspan="8">
                                <div class="empty-state">
                                    <i class="fas fa-exclamation-triangle"></i>
                                    <h3>Failed to load users</h3>
                                    <p>${result.message || 'An error occurred'}</p>
                                    <button class="btn btn-primary" onclick="loadUsers()" style="margin-top: 16px;">
                                        <i class="fas fa-redo"></i> Retry
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            } catch (error) {
                console.error('❌ Load users error:', error);
                showError('Failed to load users: ' + error.message);
                
                // Show error in table
                document.getElementById('usersTableBody').innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <h3>Connection Error</h3>
                                <p>${error.message}</p>
                                <button class="btn btn-primary" onclick="loadUsers()" style="margin-top: 16px;">
                                    <i class="fas fa-redo"></i> Retry
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        // Display users in table
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');

            if (!users || users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-users-slash"></i>
                                <h3>No users found</h3>
                                <p>Try adjusting your filters</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = users.map(user => {
                const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2);
                const statusClass = user.is_active ? 'active' : 'inactive';
                const verifiedClass = user.email_verified ? 'verified' : 'unverified';
                const joinedDate = new Date(user.created_at).toLocaleDateString('en-IN', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });

                return `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">
                                    ${user.profile_picture 
                                        ? `<img src="${user.profile_picture}" alt="${user.full_name}">` 
                                        : initials
                                    }
                                </div>
                                <div class="user-details">
                                    <div class="user-name">${user.full_name}</div>
                                    <div class="user-email">${user.email}</div>
                                </div>
                            </div>
                        </td>
                        <td>${user.phone || 'N/A'}</td>
                        <td>${user.city || 'N/A'}</td>
                        <td>
                            <span class="badge ${statusClass}">
                                <i class="fas fa-circle" style="font-size: 6px;"></i>
                                ${user.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td>
                            <span class="badge ${verifiedClass}">
                                <i class="fas ${user.email_verified ? 'fa-check-circle' : 'fa-clock'}"></i>
                                ${user.email_verified ? 'Verified' : 'Pending'}
                            </span>
                        </td>
                        <td>
                            ${user.is_admin 
                                ? `<span class="badge admin"><i class="fas fa-shield-alt"></i> ${user.admin_role || 'Admin'}</span>` 
                                : 'Customer'
                            }
                        </td>
                        <td>${joinedDate}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn view" onclick="viewUserDetails(${user.user_id})" title="View Details">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn edit" onclick="toggleUserStatus(${user.user_id}, ${user.is_active})" 
                                        title="${user.is_active ? 'Deactivate' : 'Activate'}">
                                    <i class="fas fa-${user.is_active ? 'ban' : 'check'}"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Update stats
        function updateStats(users) {
            if (!users) return;

            const total = users.length;
            const active = users.filter(u => u.is_active).length;
            const verified = users.filter(u => u.email_verified).length;
            
            const now = new Date();
            const thisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const newThisMonth = users.filter(u => new Date(u.created_at) >= thisMonth).length;

            document.getElementById('totalUsersCount').textContent = total;
            document.getElementById('activeUsersCount').textContent = active;
            document.getElementById('verifiedUsersCount').textContent = verified;
            document.getElementById('newUsersCount').textContent = newThisMonth;
        }

        // Update pagination
        function updatePagination(pagination) {
            currentPage = pagination.page;
            totalPages = pagination.pages;

            document.getElementById('paginationInfo').textContent = 
                `Showing ${(pagination.page - 1) * pagination.limit + 1}-${Math.min(pagination.page * pagination.limit, pagination.total)} of ${pagination.total} users`;

            const buttonsContainer = document.getElementById('paginationButtons');
            let buttonsHTML = '';

            // Previous button
            buttonsHTML += `
                <button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
            `;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    buttonsHTML += `
                        <button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                            ${i}
                        </button>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    buttonsHTML += `<span style="padding: 8px; color: #64748b;">...</span>`;
                }
            }

            // Next button
            buttonsHTML += `
                <button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            `;

            buttonsContainer.innerHTML = buttonsHTML;
        }

        // Change page
        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadUsers();
        }

        // View user details
        async function viewUserDetails(userId) {
            const token = localStorage.getItem('adminToken') || localStorage.getItem('admin_token');

            try {
                const response = await fetch(`${API_ENDPOINTS.userDetails}/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.success) {
                    displayUserDetails(result.data);
                    document.getElementById('userDetailsModal').classList.add('active');
                }
            } catch (error) {
                console.error('View user error:', error);
                showError('Failed to load user details');
            }
        }

        // Display user details in modal
        function displayUserDetails(user) {
            const modalBody = document.getElementById('modalBody');
            
            const stats = user.order_statistics || {};
            const addresses = user.addresses || [];

            modalBody.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <!-- Personal Info -->
                    <div>
                        <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
                            Personal Information
                        </h3>
                        <div class="detail-row">
                            <span class="detail-label">Full Name</span>
                            <span class="detail-value">${user.full_name}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email</span>
                            <span class="detail-value">${user.email}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Phone</span>
                            <span class="detail-value">${user.phone || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Status</span>
                            <span class="badge ${user.is_active ? 'active' : 'inactive'}">${user.is_active ? 'Active' : 'Inactive'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email Verified</span>
                            <span class="badge ${user.email_verified ? 'verified' : 'unverified'}">${user.email_verified ? 'Yes' : 'No'}</span>
                        </div>
                    </div>

                    <!-- Order Statistics -->
                    <div>
                        <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
                            Order Statistics
                        </h3>
                        <div class="detail-row">
                            <span class="detail-label">Total Orders</span>
                            <span class="detail-value">${stats.total_orders || 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Completed Orders</span>
                            <span class="detail-value">${stats.completed_orders || 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Total Spent</span>
                            <span class="detail-value">₹${(stats.total_spent || 0).toLocaleString()}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Last Order</span>
                            <span class="detail-value">${stats.last_order_date ? new Date(stats.last_order_date).toLocaleDateString() : 'Never'}</span>
                        </div>
                    </div>

                    <!-- Account Info -->
                    <div>
                        <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
                            Account Information
                        </h3>
                        <div class="detail-row">
                            <span class="detail-label">Joined Date</span>
                            <span class="detail-value">${new Date(user.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Last Login</span>
                            <span class="detail-value">${user.last_login ? new Date(user.last_login).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'Never'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">User ID</span>
                            <span class="detail-value">#${user.user_id}</span>
                        </div>
                    </div>

                    ${addresses.length > 0 ? `
                    <!-- Addresses -->
                    <div>
                        <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
                            Saved Addresses
                        </h3>
                        ${addresses.map(addr => `
                            <div style="background: rgba(99, 102, 241, 0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px;">
                                <div style="font-weight: 600; color: #e2e8f0; margin-bottom: 4px;">
                                    ${addr.address_type} ${addr.is_default ? '<span class="badge active" style="font-size: 10px;">Default</span>' : ''}
                                </div>
                                <div style="font-size: 13px; color: #94a3b8;">
                                    ${addr.address_line1}${addr.address_line2 ? ', ' + addr.address_line2 : ''}<br>
                                    ${addr.city}, ${addr.state} - ${addr.postal_code}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                </div>
            `;
        }

        // Toggle user status
        async function toggleUserStatus(userId, currentStatus) {
            const action = currentStatus ? 'deactivate' : 'activate';
            if (!confirm(`Are you sure you want to ${action} this user?`)) {
                return;
            }

            const token = localStorage.getItem('adminToken') || localStorage.getItem('admin_token');

            try {
                const response = await fetch(`${API_ENDPOINTS.toggleStatus}/${userId}/toggle-status`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess(`User ${action}d successfully`);
                    loadUsers();
                } else {
                    showError(result.message);
                }
            } catch (error) {
                console.error('Toggle status error:', error);
                showError('Failed to update user status');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('userDetailsModal').classList.remove('active');
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('verificationFilter').value = '';
            document.getElementById('typeFilter').value = 'customer';
            
            currentFilters = {
                search: '',
                status: '',
                verification: '',
                type: 'customer'
            };
            
            currentPage = 1;
            loadUsers();
        }

        // Export users
        function exportUsers() {
            showSuccess('Export feature coming soon!');
        }

        // Show success message
        function showSuccess(message) {
            alert('✓ ' + message);
        }

        // Show error message
        function showError(message) {
            alert('✗ ' + message);
        }

        // Redirect to login
        function redirectToLogin() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('admin_token');
            window.location.href = API_ENDPOINTS.login;
        }

        // Hide loading
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search input
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentFilters.search = e.target.value;
                    currentPage = 1;
                    loadUsers();
                }, 500);
            });

            // Filter selects
            document.getElementById('statusFilter').addEventListener('change', (e) => {
                currentFilters.status = e.target.value;
                currentPage = 1;
                loadUsers();
            });

            document.getElementById('verificationFilter').addEventListener('change', (e) => {
                currentFilters.verification = e.target.value;
                currentPage = 1;
                loadUsers();
            });

            document.getElementById('typeFilter').addEventListener('change', (e) => {
                currentFilters.type = e.target.value;
                currentPage = 1;
                loadUsers();
            });

            // Close modal on overlay click
            document.getElementById('userDetailsModal').addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) {
                    closeModal();
                }
            });
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', async () => {
            loadSidebar();
            
            const isAuthenticated = await checkAuth();
            if (isAuthenticated) {
                await loadUsers();
                setupEventListeners();
                hideLoading();
                
                // Force set active state after everything loads
                setTimeout(() => {
                    setActiveMenuItem();
                }, 500);
            }
        });
    </script>
</body>
</html>
