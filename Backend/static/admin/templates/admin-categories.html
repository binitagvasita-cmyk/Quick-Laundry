<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories Management - Quick Laundry Admin</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      /* ==================== MAIN CONTENT ==================== */
      .main-content {
        margin-left: 280px;
        padding: 32px;
        min-height: 100vh;
        transition: margin-left 0.3s ease;
      }

      /* Header */
      .top-header {
        background: #1e293b;
        padding: 24px 32px;
        border-radius: 16px;
        margin-bottom: 32px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid rgba(148, 163, 184, 0.1);
      }

      .header-left h1 {
        font-size: 28px;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 4px;
      }

      .breadcrumb {
        font-size: 14px;
        color: #64748b;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Stats Overview */
      .stats-overview {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-mini {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .stat-mini-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .stat-mini-icon.primary {
        background: rgba(99, 102, 241, 0.15);
        color: #a5b4fc;
      }
      .stat-mini-icon.success {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
      }
      .stat-mini-icon.warning {
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
      }
      .stat-mini-icon.danger {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }

      .stat-mini-content h3 {
        font-size: 24px;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 4px;
      }

      .stat-mini-content p {
        font-size: 13px;
        color: #64748b;
      }

      /* Action Bar */
      .action-bar {
        background: #1e293b;
        padding: 20px 24px;
        border-radius: 16px;
        margin-bottom: 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid rgba(148, 163, 184, 0.1);
        gap: 16px;
        flex-wrap: wrap;
      }

      .search-box {
        flex: 1;
        min-width: 250px;
        max-width: 400px;
        position: relative;
      }

      .search-box input {
        width: 100%;
        padding: 12px 16px 12px 44px;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        color: #e2e8f0;
        font-size: 14px;
        transition: all 0.2s ease;
      }

      .search-box input:focus {
        outline: none;
        border-color: #6366f1;
        background: rgba(15, 23, 42, 0.8);
      }

      .search-box i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
      }

      .action-buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
      }

      .view-toggle {
        display: flex;
        gap: 8px;
        background: rgba(15, 23, 42, 0.5);
        padding: 4px;
        border-radius: 12px;
      }

      .view-toggle button {
        padding: 8px 16px;
        background: transparent;
        border: none;
        color: #64748b;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s ease;
      }

      .view-toggle button.active {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
      }

      /* Categories Grid */
      .categories-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .category-card {
        background: #1e293b;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        overflow: hidden;
        transition: all 0.3s ease;
        position: relative;
      }

      .category-card:hover {
        transform: translateY(-4px);
        border-color: rgba(99, 102, 241, 0.3);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
      }

      .category-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
      }

      .category-header {
        padding: 24px;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.05),
          rgba(139, 92, 246, 0.05)
        );
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      }

      .category-icon-wrapper {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.2),
          rgba(139, 92, 246, 0.2)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #a5b4fc;
        margin-bottom: 16px;
      }

      .category-title {
        font-size: 18px;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 8px;
      }

      .category-description {
        font-size: 13px;
        color: #64748b;
        line-height: 1.5;
        display: -webkit-box;

        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .category-body {
        padding: 20px 24px;
      }

      .category-info {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      }

      .info-row:last-child {
        border-bottom: none;
      }

      .info-label {
        font-size: 13px;
        color: #64748b;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .info-value {
        font-size: 14px;
        font-weight: 600;
        color: #f1f5f9;
      }

      .status-badge {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .status-badge.active {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
      }

      .status-badge.inactive {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }

      .category-actions {
        display: flex;
        gap: 8px;
      }

      .action-btn {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .action-btn.edit {
        background: rgba(59, 130, 246, 0.15);
        color: #93c5fd;
        border: 1px solid rgba(59, 130, 246, 0.2);
      }

      .action-btn.edit:hover {
        background: rgba(59, 130, 246, 0.25);
      }

      .action-btn.delete {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .action-btn.delete:hover {
        background: rgba(239, 68, 68, 0.25);
      }

      /* Table View */
      .table-container {
        background: #1e293b;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        overflow: hidden;
        display: none;
      }

      .table-container.active {
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(99, 102, 241, 0.05);
      }

      th {
        padding: 16px 20px;
        text-align: left;
        font-size: 13px;
        font-weight: 600;
        color: #a5b4fc;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      tbody tr {
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        transition: background 0.2s ease;
      }

      tbody tr:hover {
        background: rgba(99, 102, 241, 0.05);
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      td {
        padding: 20px;
        font-size: 14px;
        color: #e2e8f0;
      }

      .table-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.2),
          rgba(139, 92, 246, 0.2)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #a5b4fc;
      }

      .table-actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-btn.edit {
        background: rgba(59, 130, 246, 0.15);
        color: #93c5fd;
      }

      .icon-btn.edit:hover {
        background: rgba(59, 130, 246, 0.25);
      }

      .icon-btn.delete {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }

      .icon-btn.delete:hover {
        background: rgba(239, 68, 68, 0.25);
      }

      .icon-btn.toggle {
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
      }

      .icon-btn.toggle:hover {
        background: rgba(245, 158, 11, 0.25);
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: #1e293b;
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        animation: modalSlideIn 0.3s ease;
      }

      @keyframes modalSlideIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        padding: 24px 28px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h2 {
        font-size: 20px;
        font-weight: 700;
        color: #f1f5f9;
      }

      .close-modal {
        width: 36px;
        height: 36px;
        border: none;
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .close-modal:hover {
        background: rgba(239, 68, 68, 0.25);
      }

      .modal-body {
        padding: 28px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #f1f5f9;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 12px 16px;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        transition: all 0.2s ease;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: #6366f1;
        background: rgba(15, 23, 42, 0.8);
      }

      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .checkbox-group input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
      }

      .checkbox-group label {
        margin: 0;
        cursor: pointer;
      }

      .modal-footer {
        padding: 20px 28px;
        border-top: 1px solid rgba(148, 163, 184, 0.1);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }

      .btn-cancel {
        background: rgba(148, 163, 184, 0.1);
        color: #94a3b8;
      }

      .btn-cancel:hover {
        background: rgba(148, 163, 184, 0.2);
      }

      /* Loading */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 3000;
        display: none;
        align-items: center;
        justify-content: center;
      }

      .loading-overlay.active {
        display: flex;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #64748b;
      }

      .empty-state i {
        font-size: 64px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .empty-state h3 {
        font-size: 20px;
        margin-bottom: 12px;
        color: #94a3b8;
      }

      .empty-state p {
        font-size: 14px;
        margin-bottom: 24px;
      }

      /* Toast */
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #1e293b;
        padding: 16px 24px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        z-index: 4000;
        display: none;
        align-items: center;
        gap: 12px;
        min-width: 300px;
        animation: slideInRight 0.3s ease;
      }

      .toast.active {
        display: flex;
      }

      @keyframes slideInRight {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .toast.success {
        border-left: 4px solid #22c55e;
      }
      .toast.error {
        border-left: 4px solid #ef4444;
      }
      .toast.warning {
        border-left: 4px solid #f59e0b;
      }
      .toast.info {
        border-left: 4px solid #3b82f6;
      }

      .toast i {
        font-size: 20px;
      }

      .toast.success i {
        color: #86efac;
      }
      .toast.error i {
        color: #fca5a5;
      }
      .toast.warning i {
        color: #fcd34d;
      }
      .toast.info i {
        color: #93c5fd;
      }

      .toast-message {
        flex: 1;
        font-size: 14px;
        color: #e2e8f0;
      }

      /* Responsive */
      @media (max-width: 1024px) {
        #sidebar-container {
          width: 80px;
        }
        .main-content {
          margin-left: 80px;
        }

        .categories-grid {
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }
      }

      @media (max-width: 768px) {
        .main-content {
          padding: 20px;
        }

        .action-bar {
          flex-direction: column;
          align-items: stretch;
        }

        .search-box {
          max-width: 100%;
        }

        .categories-grid {
          grid-template-columns: 1fr;
        }

        .form-row {
          grid-template-columns: 1fr;
        }

        .stats-overview {
          grid-template-columns: 1fr;
        }
      }
      /* Force Categories active */
      #sidebar-container a[href="/admin/categories"],
      .sidebar a[href="/admin/categories"] {
        background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
        color: #fff !important;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3) !important;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar Component -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="top-header">
        <div class="header-left">
          <h1><i class="fas fa-layer-group"></i> Categories Management</h1>
          <div class="breadcrumb">
            <i class="fas fa-home"></i>
            <span>Admin</span>
            <i class="fas fa-chevron-right"></i>
            <span>Categories</span>
          </div>
        </div>
      </div>

      <!-- Stats Overview -->
      <div class="stats-overview">
        <div class="stat-mini">
          <div class="stat-mini-icon primary">
            <i class="fas fa-layer-group"></i>
          </div>
          <div class="stat-mini-content">
            <h3 id="totalCategories">0</h3>
            <p>Total Categories</p>
          </div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-icon success">
            <i class="fas fa-check-circle"></i>
          </div>
          <div class="stat-mini-content">
            <h3 id="activeCategories">0</h3>
            <p>Active Categories</p>
          </div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-icon danger">
            <i class="fas fa-times-circle"></i>
          </div>
          <div class="stat-mini-content">
            <h3 id="inactiveCategories">0</h3>
            <p>Inactive Categories</p>
          </div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-icon warning">
            <i class="fas fa-tshirt"></i>
          </div>
          <div class="stat-mini-content">
            <h3 id="totalServices">0</h3>
            <p>Total Services</p>
          </div>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search categories..."
          />
        </div>
        <div class="action-buttons">
          <button class="btn btn-primary" onclick="openCreateModal()">
            <i class="fas fa-plus"></i>
            Add Category
          </button>
          <div class="view-toggle">
            <button class="active" onclick="switchView('grid')">
              <i class="fas fa-th-large"></i>
            </button>
            <button onclick="switchView('table')">
              <i class="fas fa-list"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Categories Grid View -->
      <div class="categories-grid" id="categoriesGrid">
        <!-- Categories loaded dynamically -->
      </div>

      <!-- Table View -->
      <div class="table-container" id="categoriesTable">
        <table>
          <thead>
            <tr>
              <th>Icon</th>
              <th>Category Name</th>
              <th>Description</th>
              <th>Services</th>
              <th>Display Order</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Table rows loaded dynamically -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal" id="categoryModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Add New Category</h2>
          <button class="close-modal" onclick="closeModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <form id="categoryForm">
            <input type="hidden" id="categoryId" />

            <div class="form-group">
              <label for="categoryName">Category Name *</label>
              <input
                type="text"
                id="categoryName"
                placeholder="e.g., Dry Cleaning"
                required
              />
            </div>

            <div class="form-group">
              <label for="categoryDescription">Description</label>
              <textarea
                id="categoryDescription"
                placeholder="Enter category description..."
              ></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="categoryIcon">Font Awesome Icon</label>
                <input
                  type="text"
                  id="categoryIcon"
                  placeholder="e.g., fas fa-tshirt"
                />
                <small
                  style="
                    color: #64748b;
                    font-size: 12px;
                    display: block;
                    margin-top: 4px;
                  "
                >
                  Find icons at
                  <a
                    href="https://fontawesome.com/icons"
                    target="_blank"
                    style="color: #a5b4fc"
                    >fontawesome.com</a
                  >
                </small>
              </div>

              <div class="form-group">
                <label for="displayOrder">Display Order</label>
                <input
                  type="number"
                  id="displayOrder"
                  placeholder="0"
                  min="0"
                  value="0"
                />
              </div>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="isActive" checked />
              <label for="isActive">Active Category</label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveCategory()">
            <i class="fas fa-save"></i>
            Save Category
          </button>
        </div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
      <i class="fas fa-check-circle"></i>
      <div class="toast-message" id="toastMessage">Success message</div>
    </div>

    <script>
      // Configuration
      const API_BASE_URL = window.location.origin + "/api";
      let categories = [];
      let currentView = "grid";
      let editingCategoryId = null;

      // ── Logout handler (called by sidebar component) ──
      window.handleLogout = function () {
        if (!confirm("Are you sure you want to logout?")) return;
        localStorage.removeItem("adminToken");
        localStorage.removeItem("admin_token");
        localStorage.removeItem("adminData");
        window.location.href = "/admin";
      };

      // =====================================================
      // SIDEBAR COMPONENT LOADER
      // =====================================================
      async function loadSidebar() {
        const paths = [
          "/static/admin/templates/admin-sidebar.html",
          "/static/admin/admin-sidebar.html",
          "/admin-sidebar.html",
        ];
        for (const path of paths) {
          try {
            const res = await fetch(path);
            if (!res.ok) continue;
            const html = await res.text();
            const container = document.getElementById("sidebar-container");
            container.innerHTML = html;
            container.querySelectorAll("script").forEach(function (oldScript) {
              const newScript = document.createElement("script");
              newScript.textContent = oldScript.textContent;
              document.head.appendChild(newScript);
              document.head.removeChild(newScript);
            });
            console.log("✅ Sidebar loaded and scripts executed:", path);
            return;
          } catch (e) {
            continue;
          }
        }
        console.error("❌ Sidebar could not be loaded from any path");
      }
      // =====================================================

      // ── Initialize ──
      document.addEventListener("DOMContentLoaded", async function () {
        const token = localStorage.getItem("adminToken");
        if (!token) {
          window.location.href = "/admin";
          return;
        }
        await loadSidebar();
        loadCategories();
        setupSearchListener();
      });

      // Load Categories
      async function loadCategories() {
        showLoading();
        try {
          const token = localStorage.getItem("adminToken");
          console.log(
            "Fetching categories from:",
            `${API_BASE_URL}/admin/categories/list`
          );

          const response = await fetch(
            `${API_BASE_URL}/admin/categories/list`,
            {
              method: "GET",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            }
          );

          console.log("Response status:", response.status);
          const data = await response.json();
          console.log("Response data:", data);

          if (data.success) {
            categories = data.data.categories;
            console.log("Categories loaded:", categories.length);
            updateStats();
            renderCategories();
          } else {
            showToast(data.message || "Failed to load categories", "error");
            console.error("API error:", data);
          }
        } catch (error) {
          console.error("Error loading categories:", error);
          showToast(
            "Failed to connect to server. Please check if the backend is running.",
            "error"
          );
        } finally {
          hideLoading();
        }
      }

      // Update Stats
      function updateStats() {
        const activeCount = categories.filter((c) => c.is_active).length;
        const inactiveCount = categories.length - activeCount;
        const totalServices = categories.reduce(
          (sum, c) => sum + (c.service_count || 0),
          0
        );

        document.getElementById("totalCategories").textContent =
          categories.length;
        document.getElementById("activeCategories").textContent = activeCount;
        document.getElementById("inactiveCategories").textContent =
          inactiveCount;
        document.getElementById("totalServices").textContent = totalServices;
      }

      // Render Categories
      function renderCategories(filteredCategories = null) {
        const categoriesToRender = filteredCategories || categories;

        if (currentView === "grid") {
          renderGridView(categoriesToRender);
        } else {
          renderTableView(categoriesToRender);
        }
      }

      // Render Grid View
      function renderGridView(categoriesToRender) {
        const grid = document.getElementById("categoriesGrid");

        if (categoriesToRender.length === 0) {
          grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-layer-group"></i>
                        <h3>No Categories Found</h3>
                        <p>Create your first category to get started</p>
                        <button class="btn btn-primary" onclick="openCreateModal()">
                            <i class="fas fa-plus"></i>
                            Add Category
                        </button>
                    </div>
                `;
          return;
        }

        grid.innerHTML = categoriesToRender
          .map(
            (category) => `
                <div class="category-card">
                    <div class="category-header">
                        <div class="category-icon-wrapper">
                            <i class="${category.icon || "fas fa-tag"}"></i>
                        </div>
                        <div class="category-title">${
                          category.category_name
                        }</div>
                        <div class="category-description">${
                          category.description || "No description"
                        }</div>
                    </div>
                    <div class="category-body">
                        <div class="category-info">
                            <div class="info-row">
                                <span class="info-label">
                                    <i class="fas fa-tshirt"></i>
                                    Services
                                </span>
                                <span class="info-value">${
                                  category.service_count || 0
                                }</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">
                                    <i class="fas fa-sort"></i>
                                    Display Order
                                </span>
                                <span class="info-value">${
                                  category.display_order || 0
                                }</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">
                                    <i class="fas fa-circle"></i>
                                    Status
                                </span>
                                <span class="status-badge ${
                                  category.is_active ? "active" : "inactive"
                                }">
                                    <i class="fas fa-${
                                      category.is_active ? "check" : "times"
                                    }"></i>
                                    ${
                                      category.is_active ? "Active" : "Inactive"
                                    }
                                </span>
                            </div>
                        </div>
                        <div class="category-actions">
                            <button class="action-btn edit" onclick="editCategory(${
                              category.category_id
                            })">
                                <i class="fas fa-edit"></i>
                                Edit
                            </button>
                            <button class="action-btn delete" onclick="deleteCategory(${
                              category.category_id
                            })">
                                <i class="fas fa-trash"></i>
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            `
          )
          .join("");
      }

      // Render Table View
      function renderTableView(categoriesToRender) {
        const tbody = document.getElementById("tableBody");

        if (categoriesToRender.length === 0) {
          tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 60px 20px;">
                            <div class="empty-state">
                                <i class="fas fa-layer-group"></i>
                                <h3>No Categories Found</h3>
                                <p>Create your first category to get started</p>
                            </div>
                        </td>
                    </tr>
                `;
          return;
        }

        tbody.innerHTML = categoriesToRender
          .map(
            (category) => `
                <tr>
                    <td>
                        <div class="table-icon">
                            <i class="${category.icon || "fas fa-tag"}"></i>
                        </div>
                    </td>
                    <td style="font-weight: 600;">${category.category_name}</td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        ${category.description || "No description"}
                    </td>
                    <td>${category.service_count || 0}</td>
                    <td>${category.display_order || 0}</td>
                    <td>
                        <span class="status-badge ${
                          category.is_active ? "active" : "inactive"
                        }">
                            <i class="fas fa-${
                              category.is_active ? "check" : "times"
                            }"></i>
                            ${category.is_active ? "Active" : "Inactive"}
                        </span>
                    </td>
                    <td>
                        <div class="table-actions">
                            <button class="icon-btn toggle" onclick="toggleCategoryStatus(${
                              category.category_id
                            })" 
                                    title="${
                                      category.is_active
                                        ? "Deactivate"
                                        : "Activate"
                                    }">
                                <i class="fas fa-power-off"></i>
                            </button>
                            <button class="icon-btn edit" onclick="editCategory(${
                              category.category_id
                            })" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="icon-btn delete" onclick="deleteCategory(${
                              category.category_id
                            })" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `
          )
          .join("");
      }

      // Switch View
      function switchView(view) {
        currentView = view;

        document.querySelectorAll(".view-toggle button").forEach((btn) => {
          btn.classList.remove("active");
        });
        event.target.closest("button").classList.add("active");

        const grid = document.getElementById("categoriesGrid");
        const table = document.getElementById("categoriesTable");

        if (view === "grid") {
          grid.style.display = "grid";
          table.classList.remove("active");
        } else {
          grid.style.display = "none";
          table.classList.add("active");
        }

        renderCategories();
      }

      // Open Create Modal
      function openCreateModal() {
        editingCategoryId = null;
        document.getElementById("modalTitle").textContent = "Add New Category";
        document.getElementById("categoryForm").reset();
        document.getElementById("categoryId").value = "";
        document.getElementById("isActive").checked = true;
        document.getElementById("displayOrder").value = "0";
        document.getElementById("categoryModal").classList.add("active");
      }

      // Edit Category
      async function editCategory(categoryId) {
        showLoading();
        try {
          const token = localStorage.getItem("adminToken");
          const response = await fetch(
            `${API_BASE_URL}/admin/categories/${categoryId}`,
            {
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            }
          );

          const data = await response.json();

          if (data.success) {
            const category = data.data;
            editingCategoryId = categoryId;

            document.getElementById("modalTitle").textContent = "Edit Category";
            document.getElementById("categoryId").value = category.category_id;
            document.getElementById("categoryName").value =
              category.category_name;
            document.getElementById("categoryDescription").value =
              category.description || "";
            document.getElementById("categoryIcon").value = category.icon || "";
            document.getElementById("displayOrder").value =
              category.display_order || 0;
            document.getElementById("isActive").checked = category.is_active;

            document.getElementById("categoryModal").classList.add("active");
          } else {
            showToast(data.message || "Failed to load category", "error");
          }
        } catch (error) {
          console.error("Error loading category:", error);
          showToast("Failed to load category", "error");
        } finally {
          hideLoading();
        }
      }

      // Save Category
      async function saveCategory() {
        const categoryName = document
          .getElementById("categoryName")
          .value.trim();

        if (!categoryName) {
          showToast("Please enter category name", "warning");
          return;
        }

        const categoryData = {
          category_name: categoryName,
          description: document
            .getElementById("categoryDescription")
            .value.trim(),
          icon: document.getElementById("categoryIcon").value.trim(),
          display_order:
            parseInt(document.getElementById("displayOrder").value) || 0,
          is_active: document.getElementById("isActive").checked,
        };

        showLoading();
        try {
          const token = localStorage.getItem("adminToken");
          const isEdit = editingCategoryId !== null;
          const url = isEdit
            ? `${API_BASE_URL}/admin/categories/${editingCategoryId}/update`
            : `${API_BASE_URL}/admin/categories/create`;

          const method = isEdit ? "PUT" : "POST";

          const response = await fetch(url, {
            method: method,
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(categoryData),
          });

          const data = await response.json();

          if (data.success) {
            showToast(data.message, "success");
            closeModal();
            loadCategories();
          } else {
            showToast(data.message || "Failed to save category", "error");
          }
        } catch (error) {
          console.error("Error saving category:", error);
          showToast("Failed to save category", "error");
        } finally {
          hideLoading();
        }
      }

      // Delete Category
      async function deleteCategory(categoryId) {
        if (
          !confirm(
            "Are you sure you want to delete this category? This action cannot be undone."
          )
        ) {
          return;
        }

        showLoading();
        try {
          const token = localStorage.getItem("adminToken");
          const response = await fetch(
            `${API_BASE_URL}/admin/categories/${categoryId}/delete`,
            {
              method: "DELETE",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            }
          );

          const data = await response.json();

          if (data.success) {
            showToast(data.message, "success");
            loadCategories();
          } else {
            showToast(data.message || "Failed to delete category", "error");
          }
        } catch (error) {
          console.error("Error deleting category:", error);
          showToast("Failed to delete category", "error");
        } finally {
          hideLoading();
        }
      }

      // Toggle Category Status
      async function toggleCategoryStatus(categoryId) {
        showLoading();
        try {
          const token = localStorage.getItem("adminToken");
          const response = await fetch(
            `${API_BASE_URL}/admin/categories/${categoryId}/toggle-status`,
            {
              method: "PUT",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            }
          );

          const data = await response.json();

          if (data.success) {
            showToast(data.message, "success");
            loadCategories();
          } else {
            showToast(data.message || "Failed to update status", "error");
          }
        } catch (error) {
          console.error("Error toggling status:", error);
          showToast("Failed to update status", "error");
        } finally {
          hideLoading();
        }
      }

      // Search Categories
      function setupSearchListener() {
        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("input", function (e) {
          const searchTerm = e.target.value.toLowerCase().trim();

          if (searchTerm === "") {
            renderCategories();
            return;
          }

          const filtered = categories.filter((category) => {
            return (
              category.category_name.toLowerCase().includes(searchTerm) ||
              (category.description &&
                category.description.toLowerCase().includes(searchTerm))
            );
          });

          renderCategories(filtered);
        });
      }

      // Close Modal
      function closeModal() {
        document.getElementById("categoryModal").classList.remove("active");
        editingCategoryId = null;
      }

      // Show Loading
      function showLoading() {
        document.getElementById("loadingOverlay").classList.add("active");
      }

      // Hide Loading
      function hideLoading() {
        document.getElementById("loadingOverlay").classList.remove("active");
      }

      // Show Toast
      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        const toastMessage = document.getElementById("toastMessage");
        const icon = toast.querySelector("i");

        toast.classList.remove("success", "error", "warning", "info");
        toast.classList.add(type);

        const icons = {
          success: "fa-check-circle",
          error: "fa-times-circle",
          warning: "fa-exclamation-triangle",
          info: "fa-info-circle",
        };
        icon.className = `fas ${icons[type]}`;

        toastMessage.textContent = message;
        toast.classList.add("active");

        setTimeout(() => {
          toast.classList.remove("active");
        }, 3000);
      }

      // Close modal on outside click
      document
        .getElementById("categoryModal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeModal();
          }
        });

      // ESC key to close modal
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          closeModal();
        }
      });
    </script>
  </body>
</html>
