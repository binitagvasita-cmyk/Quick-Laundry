<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Quick Laundry Admin</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }

        /* Active sidebar link */
        #sidebar-container a[href="/admin/notifications"],
        .sidebar a[href="/admin/notifications"] {
            background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3) !important;
        }

        /* Loading */
        .loading-overlay {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .loading-spinner { text-align: center; }
        .loading-spinner .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        .loading-spinner p { color: #64748b; font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sidebar */
        #sidebar-container {
            position: fixed; left: 0; top: 0;
            height: 100vh; width: 280px; z-index: 1000; transition: all 0.3s;
        }

        /* Main */
        .main-content { margin-left: 280px; padding: 32px; min-height: 100vh; transition: margin-left 0.3s; }

        /* Header */
        .top-header {
            background: #1e293b; padding: 20px 28px; border-radius: 16px;
            margin-bottom: 28px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid rgba(148,163,184,0.1);
        }
        .header-left h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
        .breadcrumb { font-size: 13px; color: #64748b; display: flex; align-items: center; gap: 8px; }
        .header-right { display: flex; align-items: center; gap: 14px; }

        .notification-btn {
            position: relative; background: rgba(99,102,241,0.1); border: none;
            width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
            transition: all 0.2s; color: #a5b4fc; font-size: 18px;
        }
        .notification-btn:hover { background: rgba(99,102,241,0.2); }
        .notification-badge {
            position: absolute; top: -4px; right: -4px;
            background: linear-gradient(135deg,#ef4444,#dc2626);
            color: #fff; min-width: 20px; height: 20px; border-radius: 10px;
            font-size: 11px; display: flex; align-items: center; justify-content: center;
            font-weight: 600; padding: 0 6px; border: 2px solid #1e293b;
        }
        .user-profile {
            display: flex; align-items: center; gap: 12px; cursor: pointer;
            padding: 8px 12px 8px 8px; border-radius: 12px;
            transition: background 0.2s; background: rgba(99,102,241,0.05);
        }
        .user-profile:hover { background: rgba(99,102,241,0.1); }
        .user-avatar {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 600; font-size: 16px;
        }
        .user-info h4 { font-size: 14px; font-weight: 600; color: #f1f5f9; }
        .user-info p  { font-size: 12px; color: #64748b; }

        /* Mark all button */
        .mark-all-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: 10px;
            background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
            color: #818cf8; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .mark-all-btn:hover { background: rgba(99,102,241,0.2); }

        /* Summary Cards */
        .summary-grid {
            display: grid; grid-template-columns: repeat(4,1fr);
            gap: 20px; margin-bottom: 28px;
        }
        .summary-card {
            background: #1e293b; border-radius: 16px; padding: 22px;
            border: 1px solid rgba(148,163,184,0.1);
            display: flex; align-items: center; gap: 16px;
            transition: transform 0.2s; position: relative; overflow: hidden;
        }
        .summary-card:hover { transform: translateY(-2px); }
        .summary-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
        .summary-card.c-purple::before { background: linear-gradient(90deg,#6366f1,#8b5cf6); }
        .summary-card.c-green::before  { background: linear-gradient(90deg,#10b981,#059669); }
        .summary-card.c-amber::before  { background: linear-gradient(90deg,#f59e0b,#d97706); }
        .summary-card.c-red::before    { background: linear-gradient(90deg,#ef4444,#dc2626); }

        .card-icon {
            width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .card-icon.purple { background: rgba(99,102,241,0.15);  color: #818cf8; }
        .card-icon.green  { background: rgba(16,185,129,0.15);  color: #34d399; }
        .card-icon.amber  { background: rgba(245,158,11,0.15);  color: #fbbf24; }
        .card-icon.red    { background: rgba(239,68,68,0.15);   color: #f87171; }

        .card-info .count { font-size: 26px; font-weight: 700; color: #f1f5f9; }
        .card-info .label { font-size: 12px; color: #64748b; margin-top: 2px; }

        /* Filter Tabs */
        .filter-bar {
            background: #1e293b; padding: 18px 24px; border-radius: 14px;
            margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(148,163,184,0.1); flex-wrap: wrap;
        }
        .filter-label { font-size: 13px; color: #64748b; font-weight: 500; margin-right: 4px; }
        .filter-btn {
            padding: 8px 18px; border-radius: 8px;
            border: 1px solid rgba(148,163,184,0.15);
            background: transparent; color: #94a3b8;
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .filter-btn:hover { background: rgba(99,102,241,0.1); color: #c7d2fe; border-color: rgba(99,102,241,0.3); }
        .filter-btn.active {
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            color: #fff; border-color: transparent;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        /* Notifications List */
        .notifications-card {
            background: #1e293b; border-radius: 16px;
            border: 1px solid rgba(148,163,184,0.1); overflow: hidden;
        }
        .notifications-header {
            padding: 22px 28px; border-bottom: 1px solid rgba(148,163,184,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .notifications-header h3 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .unread-badge {
            background: linear-gradient(135deg,#ef4444,#dc2626);
            color: #fff; padding: 3px 10px; border-radius: 8px;
            font-size: 12px; font-weight: 600;
        }

        /* Single notification item */
        .notif-item {
            display: flex; align-items: flex-start; gap: 16px;
            padding: 20px 28px; border-bottom: 1px solid rgba(148,163,184,0.06);
            transition: background 0.2s; position: relative; cursor: pointer;
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item:hover { background: rgba(99,102,241,0.04); }
        .notif-item.unread { background: rgba(99,102,241,0.03); }
        .notif-item.unread::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: #6366f1; border-radius: 0 2px 2px 0;
        }

        .notif-icon {
            width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .notif-icon.order  { background: rgba(16,185,129,0.15);  color: #34d399; }
        .notif-icon.user   { background: rgba(245,158,11,0.15);  color: #fbbf24; }
        .notif-icon.review { background: rgba(99,102,241,0.15);  color: #818cf8; }
        .notif-icon.system { background: rgba(239,68,68,0.15);   color: #f87171; }

        .notif-body { flex: 1; min-width: 0; }
        .notif-title {
            font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px;
            display: flex; align-items: center; gap: 8px;
        }
        .notif-title .new-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #6366f1; flex-shrink: 0;
        }
        .notif-msg  { font-size: 13px; color: #94a3b8; margin-bottom: 8px; line-height: 1.5; }
        .notif-extra {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
        }
        .notif-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
        }
        .notif-chip.green  { background: rgba(16,185,129,0.12); color: #34d399; }
        .notif-chip.amber  { background: rgba(245,158,11,0.12); color: #fbbf24; }
        .notif-chip.purple { background: rgba(99,102,241,0.12); color: #818cf8; }
        .notif-chip.slate  { background: rgba(148,163,184,0.12); color: #94a3b8; }

        .notif-time { font-size: 12px; color: #475569; }

        .notif-actions {
            display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; align-items: flex-end;
        }
        .action-btn {
            background: none; border: none; cursor: pointer;
            font-size: 14px; padding: 6px; border-radius: 8px; transition: all 0.2s;
        }
        .action-btn.read-btn  { color: #64748b; }
        .action-btn.read-btn:hover  { background: rgba(16,185,129,0.1); color: #34d399; }
        .action-btn.del-btn   { color: #64748b; }
        .action-btn.del-btn:hover   { background: rgba(239,68,68,0.1); color: #f87171; }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 64px 32px; color: #475569;
        }
        .empty-state i   { font-size: 48px; margin-bottom: 16px; display: block; }
        .empty-state h3  { font-size: 16px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        .empty-state p   { font-size: 14px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; right: 28px;
            background: #1e293b; border: 1px solid rgba(148,163,184,0.15);
            border-radius: 12px; padding: 14px 18px;
            display: flex; align-items: center; gap: 12px;
            z-index: 9999; transform: translateY(100px); opacity: 0;
            transition: all 0.3s; min-width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .toast.show  { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.error   { border-left: 4px solid #ef4444; }
        .toast-icon { font-size: 18px; }
        .toast.success .toast-icon { color: #34d399; }
        .toast.error   .toast-icon { color: #f87171; }
        .toast-msg { font-size: 14px; color: #e2e8f0; }

        /* Responsive */
        @media (max-width:1280px){ .summary-grid{ grid-template-columns:repeat(2,1fr); } }
        @media (max-width:1024px){
            #sidebar-container{ width:80px; }
            .main-content{ margin-left:80px; }
        }
        @media (max-width:768px){
            #sidebar-container{ width:0; }
            .main-content{ margin-left:0; padding:16px; }
            .summary-grid{ grid-template-columns:1fr 1fr; }
            .top-header{ flex-wrap:wrap; gap:12px; }
            .user-info{ display:none; }
            .notif-item{ padding:16px; }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading Notifications...</p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle toast-icon" id="toastIcon"></i>
        <span class="toast-msg" id="toastMsg">Success</span>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="main-content">

        <!-- Header -->
        <header class="top-header">
            <div class="header-left">
                <h1><i class="fas fa-bell" style="color:#818cf8;margin-right:10px;"></i>Notifications</h1>
                <div class="breadcrumb">
                    <i class="fas fa-home"></i><span>/</span><span>Notifications</span>
                </div>
            </div>
            <div class="header-right">
                <button class="mark-all-btn" onclick="markAllRead()">
                    <i class="fas fa-check-double"></i> Mark All Read
                </button>
                <button class="notification-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationCount">0</span>
                </button>
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-info">
                        <h4 id="userName">Loading...</h4>
                        <p  id="userRole">Admin</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="summary-card c-purple">
                <div class="card-icon purple"><i class="fas fa-bell"></i></div>
                <div class="card-info">
                    <div class="count" id="countTotal">0</div>
                    <div class="label">Total Notifications</div>
                </div>
            </div>
            <div class="summary-card c-red">
                <div class="card-icon red"><i class="fas fa-circle"></i></div>
                <div class="card-info">
                    <div class="count" id="countUnread">0</div>
                    <div class="label">Unread</div>
                </div>
            </div>
            <div class="summary-card c-green">
                <div class="card-icon green"><i class="fas fa-shopping-bag"></i></div>
                <div class="card-info">
                    <div class="count" id="countOrders">0</div>
                    <div class="label">New Orders</div>
                </div>
            </div>
            <div class="summary-card c-amber">
                <div class="card-icon amber"><i class="fas fa-users"></i></div>
                <div class="card-info">
                    <div class="count" id="countUsers">0</div>
                    <div class="label">New Users</div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <span class="filter-label"><i class="fas fa-filter"></i>&nbsp; Filter:</span>
            <button class="filter-btn active" onclick="setFilter('all',   this)">All</button>
            <button class="filter-btn"        onclick="setFilter('new_order',  this)"><i class="fas fa-shopping-bag"></i> Orders</button>
            <button class="filter-btn"        onclick="setFilter('new_user',   this)"><i class="fas fa-user-plus"></i> New Users</button>
            <button class="filter-btn"        onclick="setFilter('new_review', this)"><i class="fas fa-star"></i> Reviews</button>
        </div>

        <!-- Notifications List -->
        <div class="notifications-card">
            <div class="notifications-header">
                <h3>All Notifications</h3>
                <span class="unread-badge" id="unreadBadge">0 Unread</span>
            </div>
            <div id="notifList">
                <div class="empty-state">
                    <i class="fas fa-bell"></i>
                    <h3>Loading notifications...</h3>
                </div>
            </div>
        </div>

    </main>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const API_BASE_URL = window.location.origin;
        const API = {
            verify:   `${API_BASE_URL}/api/admin/auth/verify`,
            logout:   `${API_BASE_URL}/api/admin/auth/logout`,
            list:     `${API_BASE_URL}/api/admin/notifications/list`,
            markRead: (id) => `${API_BASE_URL}/api/admin/notifications/${id}/read`,
            markAll:  `${API_BASE_URL}/api/admin/notifications/mark-all-read`,
            delete:   (id) => `${API_BASE_URL}/api/admin/notifications/${id}/delete`,
            login:    `${API_BASE_URL}/admin`
        };

        let currentFilter = 'all';
        let allNotifications = [];

        // ============================================================
        // SIDEBAR LOADER — identical to all other admin pages
        // ============================================================
        async function loadSidebar() {
            const paths = [
                '/static/admin/templates/admin-sidebar.html',
                '/static/admin/admin-sidebar.html',
                '/admin-sidebar.html'
            ];
            for (const path of paths) {
                try {
                    const res = await fetch(path);
                    if (!res.ok) continue;
                    const html = await res.text();
                    const container = document.getElementById('sidebar-container');
                    container.innerHTML = html;
                    container.querySelectorAll('script').forEach(old => {
                        const s = document.createElement('script');
                        s.textContent = old.textContent;
                        document.head.appendChild(s);
                        document.head.removeChild(s);
                    });
                    console.log('✅ Sidebar loaded:', path);
                    return;
                } catch(e) { continue; }
            }
        }

        // ============================================================
        // AUTH
        // ============================================================
        function getToken() {
            return localStorage.getItem('adminToken') || localStorage.getItem('admin_token') || '';
        }
        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
        }
        function redirectToLogin() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('admin_token');
            window.location.href = API.login;
        }

        async function checkAuth() {
            if (!getToken()) { redirectToLogin(); return; }
            try {
                const res  = await fetch(API.verify, { headers: authHeaders() });
                const json = await res.json();
                if (json.success) {
                    const a = json.data.admin;
                    document.getElementById('userName').textContent  = a.fullName;
                    document.getElementById('userRole').textContent  = a.adminRole || 'Admin';
                    const initials = a.fullName.split(' ').map(n=>n[0]).join('').substring(0,2);
                    document.getElementById('userAvatar').textContent = initials;
                    await loadNotifications();
                    hideLoading();
                } else { redirectToLogin(); }
            } catch(e) {
                console.error('Auth error:', e);
                // Show demo data if API not reachable
                buildFallback();
                hideLoading();
            }
        }

        window.handleLogout = async function() {
            if (!confirm('Are you sure you want to logout?')) return;
            try { await fetch(API.logout, { method:'POST', headers: authHeaders() }); } catch(e) {}
            redirectToLogin();
        };

        function hideLoading() {
            const el = document.getElementById('loadingOverlay');
            if (el) el.style.display = 'none';
        }

        // ============================================================
        // LOAD NOTIFICATIONS
        // ============================================================
        async function loadNotifications() {
            try {
                const url = currentFilter === 'all'
                    ? `${API.list}?limit=100`
                    : `${API.list}?type=${currentFilter}&limit=100`;
                const res  = await fetch(url, { headers: authHeaders() });
                const json = await res.json();

                if (json.success) {
                    allNotifications = json.data.notifications || [];
                    const counts     = json.data.counts || {};

                    // Update summary cards
                    document.getElementById('countTotal').textContent  = counts.total  || 0;
                    document.getElementById('countUnread').textContent = counts.unread || 0;
                    document.getElementById('countOrders').textContent = counts.orders || 0;
                    document.getElementById('countUsers').textContent  = counts.users  || 0;

                    // Header badge
                    document.getElementById('notificationCount').textContent = counts.unread || 0;
                    document.getElementById('unreadBadge').textContent = `${counts.unread || 0} Unread`;

                    // Sidebar badges
                    if (typeof window.updateSidebarBadges === 'function') {
                        window.updateSidebarBadges(counts.orders || 0, counts.reviews || 0);
                    }

                    renderNotifications(allNotifications);
                }
            } catch(e) {
                console.error('Load notifications error:', e);
                buildFallback();
            }
        }

        // ============================================================
        // FILTER
        // ============================================================
        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadNotifications();
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderNotifications(list) {
            const container = document.getElementById('notifList');
            if (!list.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell-slash"></i>
                        <h3>No notifications found</h3>
                        <p>There are no notifications for the selected filter.</p>
                    </div>`;
                return;
            }

            container.innerHTML = list.map(n => buildNotifHTML(n)).join('');
        }

        function buildNotifHTML(n) {
            const isUnread = !n.is_read;
            const icon     = typeIcon(n.notification_type);
            const iconCls  = typeIconClass(n.notification_type);
            const extra    = n.extra || {};
            const chips    = buildChips(n.notification_type, extra);

            return `
            <div class="notif-item ${isUnread ? 'unread' : ''}" id="notif-${n.notification_id}">
                <div class="notif-icon ${iconCls}">
                    <i class="${icon}"></i>
                </div>
                <div class="notif-body">
                    <div class="notif-title">
                        ${isUnread ? '<span class="new-dot"></span>' : ''}
                        ${esc(n.title)}
                    </div>
                    <div class="notif-msg">${esc(n.message)}</div>
                    ${chips ? `<div class="notif-extra">${chips}</div>` : ''}
                    <div class="notif-time">
                        <i class="fas fa-clock" style="margin-right:4px;"></i>${fmtTime(n.created_at)}
                    </div>
                </div>
                <div class="notif-actions">
                    ${isUnread ? `
                    <button class="action-btn read-btn" title="Mark as read"
                        onclick="markRead(${n.notification_id}, event)">
                        <i class="fas fa-check"></i>
                    </button>` : `<button class="action-btn read-btn" title="Already read" disabled style="opacity:0.3">
                        <i class="fas fa-check-double"></i>
                    </button>`}
                    <button class="action-btn del-btn" title="Delete"
                        onclick="deleteNotif(${n.notification_id}, event)">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>`;
        }

        function buildChips(type, extra) {
            if (!extra || !Object.keys(extra).length) return '';

            if (type === 'new_order') {
                const parts = [];
                if (extra.order_number) parts.push(`<span class="notif-chip purple"><i class="fas fa-hashtag"></i>${esc(extra.order_number)}</span>`);
                if (extra.customer_name) parts.push(`<span class="notif-chip slate"><i class="fas fa-user"></i>${esc(extra.customer_name)}</span>`);
                if (extra.total_amount)  parts.push(`<span class="notif-chip green"><i class="fas fa-rupee-sign"></i>${parseFloat(extra.total_amount).toFixed(0)}</span>`);
                if (extra.status)        parts.push(`<span class="notif-chip amber"><i class="fas fa-circle" style="font-size:8px;"></i>${cap(extra.status)}</span>`);
                return parts.join('');
            }
            if (type === 'new_user') {
                const parts = [];
                if (extra.full_name) parts.push(`<span class="notif-chip amber"><i class="fas fa-user"></i>${esc(extra.full_name)}</span>`);
                if (extra.email)     parts.push(`<span class="notif-chip slate"><i class="fas fa-envelope"></i>${esc(extra.email)}</span>`);
                if (extra.phone)     parts.push(`<span class="notif-chip slate"><i class="fas fa-phone"></i>${esc(extra.phone)}</span>`);
                return parts.join('');
            }
            if (type === 'new_review') {
                const parts = [];
                if (extra.reviewer_name) parts.push(`<span class="notif-chip purple"><i class="fas fa-user"></i>${esc(extra.reviewer_name)}</span>`);
                if (extra.rating)        parts.push(`<span class="notif-chip amber"><i class="fas fa-star"></i>${extra.rating}/5</span>`);
                if (extra.service_type)  parts.push(`<span class="notif-chip slate"><i class="fas fa-tshirt"></i>${esc(extra.service_type)}</span>`);
                return parts.join('');
            }
            return '';
        }

        // ============================================================
        // ACTIONS
        // ============================================================
        async function markRead(id, event) {
            event.stopPropagation();
            try {
                const res  = await fetch(API.markRead(id), { method:'PUT', headers: authHeaders() });
                const json = await res.json();
                if (json.success) {
                    const el = document.getElementById(`notif-${id}`);
                    if (el) {
                        el.classList.remove('unread');
                        el.querySelector('.notif-title .new-dot')?.remove();
                        el.querySelector('.read-btn').outerHTML = `
                            <button class="action-btn read-btn" disabled style="opacity:0.3">
                                <i class="fas fa-check-double"></i>
                            </button>`;
                    }
                    // Update counts
                    const ub = document.getElementById('countUnread');
                    const nb = document.getElementById('notificationCount');
                    const hb = document.getElementById('unreadBadge');
                    const cur = parseInt(ub.textContent) || 0;
                    if (cur > 0) {
                        ub.textContent = cur - 1;
                        nb.textContent = cur - 1;
                        hb.textContent = `${cur - 1} Unread`;
                    }
                    showToast('Marked as read', 'success');
                }
            } catch(e) { showToast('Failed to mark as read', 'error'); }
        }

        async function markAllRead() {
            try {
                const res  = await fetch(API.markAll, { method:'PUT', headers: authHeaders() });
                const json = await res.json();
                if (json.success) {
                    showToast(`${json.data?.marked || 'All'} notifications marked as read`, 'success');
                    await loadNotifications();
                }
            } catch(e) { showToast('Failed to mark all as read', 'error'); }
        }

        async function deleteNotif(id, event) {
            event.stopPropagation();
            if (!confirm('Delete this notification?')) return;
            try {
                const res  = await fetch(API.delete(id), { method:'DELETE', headers: authHeaders() });
                const json = await res.json();
                if (json.success) {
                    document.getElementById(`notif-${id}`)?.remove();
                    showToast('Notification deleted', 'success');
                    // Update total count
                    const tc = document.getElementById('countTotal');
                    tc.textContent = Math.max(0, (parseInt(tc.textContent)||0) - 1);
                }
            } catch(e) { showToast('Failed to delete notification', 'error'); }
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function typeIcon(type) {
            const map = { new_order:'fas fa-shopping-bag', new_user:'fas fa-user-plus', new_review:'fas fa-star', payment_received:'fas fa-rupee-sign', system_alert:'fas fa-exclamation-circle' };
            return map[type] || 'fas fa-bell';
        }
        function typeIconClass(type) {
            const map = { new_order:'order', new_user:'user', new_review:'review', payment_received:'order', system_alert:'system' };
            return map[type] || 'system';
        }
        function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function fmtTime(s) {
            if (!s) return '';
            const d    = new Date(s);
            const now  = new Date();
            const diff = Math.floor((now - d) / 1000);
            if (diff < 60)   return 'Just now';
            if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
            if (diff < 86400)return `${Math.floor(diff/3600)} hour${Math.floor(diff/3600)>1?'s':''} ago`;
            if (diff < 604800)return `${Math.floor(diff/86400)} day${Math.floor(diff/86400)>1?'s':''} ago`;
            return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
        }
        function showToast(msg, type='success') {
            const el  = document.getElementById('toast');
            const ico = document.getElementById('toastIcon');
            document.getElementById('toastMsg').textContent = msg;
            el.className  = `toast ${type}`;
            ico.className = `fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'} toast-icon`;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ============================================================
        // INIT
        // ============================================================
        window.addEventListener('DOMContentLoaded', async () => {
            await loadSidebar();
            checkAuth();
        });
    </script>
